name: hobeian-zg204zv
components:
  - id: main
    capabilities:
      - id: presenceSensor           # 재실
        version: 1
      - id: temperatureMeasurement   # 온도
        version: 1
      - id: relativeHumidityMeasurement # 습도
        version: 1
      - id: battery                  # 배터리
        version: 1
      - id: illuminanceMeasurement   # 조도
        version: 1
    categories:
      - name: PresenceSensor
preferences:
  - name: "prefIndicatorZV"    # ZV 추가
    title: "LED Indicator"
    description: "Turn the device LED on or off."
    required: false
    preferenceType: boolean
    definition:
      default: true
  - name: "prefMotionSensZV"   # ZV 추가
    title: "Motion Detection Sensitivity"
    description: "Range: 0 to 19"
    required: false
    preferenceType: integer
    definition:
      minimum: 0
      maximum: 19
      default: 7
  - name: "prefFadingTimeZV"   # ZV 추가
    title: "Presence Keep Time (sec)"
    description: "Range: 0 to 28800 (10초 단위)"
    required: false
    preferenceType: integer
    definition:
      minimum: 0
      maximum: 28800
      default: 60
  - name: "prefIllumInterval"
    title: "Illuminance Interval (min)"
    description: "Range: 1 to 720"
    required: false
    preferenceType: integer
    definition:
      minimum: 1
      maximum: 720
      default: 30
  - name: "prefTempCalib"
    title: "Temperature Calibration"
    description: "Offset to apply (-10.0 to 10.0)"
    required: false
    preferenceType: number
    definition:
      minimum: -10.0
      maximum: 10.0
      default: 0.0
  - name: "prefHumidCalib"
    title: "Humidity Calibration"
    description: "Offset to apply (-20 to 20)"
    required: false
    preferenceType: integer
    definition:
      minimum: -20
      maximum: 20
      default: 0