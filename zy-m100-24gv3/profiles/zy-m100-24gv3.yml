name: zy-m100-24gv3
components:
  - id: main
    capabilities:
      - id: presenceSensor           # 재실
        version: 1
      - id: illuminanceMeasurement   # 조도
        version: 1
      - id: voicewatch56866.radarInfo
        version: 1
    categories:
      - name: PresenceSensor

preferences:
  - name: presenceTimeout
    title: "감지 유지 시간 (Fade Time)"
    description: "움직임이 없어진 후 재실 상태를 유지할 시간(초)입니다."
    required: false
    preferenceType: integer
    definition:
      minimum: 1
      maximum: 15000
      default: 60
  - name: presenceSensitivity
    title: "재실 민감도 (Presence)"
    description: "미세한 움직임을 감지하는 민감도입니다. (1~10)"
    required: false
    preferenceType: integer
    definition:
      minimum: 1
      maximum: 10
      default: 7
  - name: moveSensitivity
    title: "동작 민감도 (Move)"
    description: "큰 움직임을 감지하는 민감도입니다. (1~10)"
    required: false
    preferenceType: integer
    definition:
      minimum: 1
      maximum: 10
      default: 7
  - name: detectionDistanceMin
    title: "최소 감지 거리 (m)"
    description: "0.75m 단위로 설정 가능 (예: 0, 0.75, 1.5...)"
    required: false
    preferenceType: number
    definition:
      minimum: 0
      maximum: 8.25
      default: 0
  - name: detectionDistanceMax
    title: "최대 감지 거리 (m)"
    description: "0.75m 단위로 설정 가능 (예: 0.75, 1.5, 2.25...)"
    required: false
    preferenceType: number
    definition:
      minimum: 0.75
      maximum: 9.0
      default: 6.0
  - name: distanceSwitch
    title: "거리 감지 스위치"
    description: "거리 기반 감지 필터 기능을 켜거나 끕니다."
    required: false
    preferenceType: boolean
    definition:
      default: false